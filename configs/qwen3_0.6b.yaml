# Qwen3-0.6B from-scratch pretraining config.
# Defaults tuned for A100 80GB. For H100, you can ~double micro_batch_size.
# For smaller GPUs (24-40GB), halve micro_batch_size and double grad_accum_steps.

model:
  # all ModelConfig fields default to Qwen3-0.6B; override here if needed
  max_seq_len: 4096

# --- data ---
# Run src/data/prepare.py into these dirs first. List multiple for a mixture.
data_dirs:
  - data/fineweb_edu
  # - data/fineweb_kor
  # - data/the_stack

# --- batch / tokens ---
micro_batch_size: 16        # sequences per GPU per micro-step
grad_accum_steps: 8         # -> global batch = 16*8*world*4096 tokens
# With 5 GPUs: 16*8*5*4096 = ~2.6M tokens/step

# --- schedule ---
# max_steps * tokens_per_step should hit your token budget.
# e.g. ~100B tokens / 2.6M per step ~= 38k steps on 5 GPUs.
max_steps: 40000
warmup_steps: 2000
lr: 3.0e-4
min_lr: 3.0e-5
weight_decay: 0.1
grad_clip: 1.0

# --- io ---
out_dir: checkpoints/qwen3_0.6b
log_interval: 10
save_interval: 2000
