# Qwen3-0.6B VALIDATION run — 12B tokens, 5x B200 (GPUs 3,4,5,6,7).
# Goal: confirm real-text loss curve is healthy before the full 100B run.
# micro_batch_size=32 is conservative for the ~86GB free on the shared box
# (full-GPU B200 could do 64). Bump later when GPUs are fully free.

model:
  max_seq_len: 4096

data_dirs:
  - data/fineweb_edu
  - data/fineweb_kor

micro_batch_size: 16        # conservative for unattended run on shared ~86GB-free GPUs
grad_accum_steps: 8
# 5 GPUs: 16*8*5*4096 = ~2.6M tokens/step  ->  12B / 2.6M ~= 4500 steps

max_steps: 4500
warmup_steps: 200
lr: 3.0e-4
min_lr: 3.0e-5
weight_decay: 0.1
grad_clip: 1.0

out_dir: checkpoints/qwen3_0.6b_val
log_interval: 10
save_interval: 1500
